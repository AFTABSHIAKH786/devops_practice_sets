<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Practice Exercise Bank · Python · Go · Kubernetes · IaC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #13131a;
    --panel-2: #0e0e14;
    --line: #1e2230;
    --text: #e7e9ee;
    --muted: #6b7285;
    --faint: #3a4152;

    --lv-basic: #22c55e;
    --lv-inter: #3b82f6;
    --lv-adv:   #f59e0b;
    --lv-exp:   #ef4444;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body { min-height: 100vh; padding-bottom: 40px; }

  a { color: inherit; }

  ::selection { background: #3b82f655; }

  /* ── Header ── */
  .site-header {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(180deg, #101018 0%, #0a0a0f 88%);
    border-bottom: 1px solid var(--line);
    padding: 18px 16px 0;
    backdrop-filter: blur(8px);
  }
  .header-inner { max-width: 780px; margin: 0 auto; }
  .eyebrow {
    font-size: 10.5px; font-weight: 800; letter-spacing: .16em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .eyebrow .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--faint); }
  h1.title {
    font-size: 22px; font-weight: 900; color: #f8fafc; line-height: 1.15;
    letter-spacing: -0.01em; margin-bottom: 3px;
  }
  .subtitle { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }

  /* global progress */
  .global-progress {
    display: flex; align-items: center; gap: 12px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 13px; margin-bottom: 14px;
  }
  .global-bar-wrap { flex: 1; height: 6px; background: #1a1e2b; border-radius: 99px; overflow: hidden; }
  .global-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#6366f1,#a855f7); transition: width .5s; }
  .global-progress-label { font-size: 11.5px; font-weight: 700; color: #c4b5fd; white-space: nowrap; }

  /* legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    padding-bottom: 12px; font-size: 11px; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* track tabs */
  .track-tabs { display: flex; gap: 2px; }
  .track-tab {
    flex: 1; padding: 9px 4px 11px; border: none; background: transparent;
    border-bottom: 3px solid transparent; cursor: pointer; text-align: center;
    transition: background .15s;
  }
  .track-tab:hover { background: #14141d; }
  .track-tab .t-emoji { font-size: 17px; display: block; margin-bottom: 2px; }
  .track-tab .t-name {
    font-size: 10.5px; font-weight: 800; display: block;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-tab .t-pct { font-size: 9.5px; display: block; margin-top: 1px; }

  /* ── Main ── */
  .main { max-width: 780px; margin: 0 auto; padding: 16px 16px 0; }

  /* track overview card */
  .track-card {
    border-radius: 16px; padding: 18px 18px 16px; margin-bottom: 14px;
    border: 1px solid;
  }
  .track-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .track-card-emoji { font-size: 22px; margin-bottom: 5px; }
  .track-card-title { font-size: 19px; font-weight: 900; color: #f8fafc; letter-spacing: -.01em; }
  .track-card-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .track-card-count { font-size: 11px; color: var(--faint); margin-top: 6px; font-weight: 600; }
  .track-card-pct { font-size: 30px; font-weight: 900; line-height: 1; text-align: right; }
  .track-card-pct-label { font-size: 10.5px; color: var(--muted); text-align: right; margin-top: 2px; }

  .track-progress-wrap { height: 5px; background: #ffffff12; border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .track-progress-fill { height: 100%; border-radius: 99px; transition: width .5s; }

  .tier-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .tier-stat-chip {
    background: #00000033; border-radius: 9px; padding: 7px 4px;
    text-align: center; border: 1px solid #ffffff0f;
  }
  .tier-stat-name { font-size: 9.5px; font-weight: 800; letter-spacing: .03em; }
  .tier-stat-frac { font-size: 13px; font-weight: 800; color: #f1f5f9; margin-top: 2px; }

  /* topic selector */
  .topic-selector {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 10px;
    scrollbar-width: none;
  }
  .topic-selector::-webkit-scrollbar { display: none; }
  .topic-pill {
    flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
    border: 1.5px solid var(--line); background: var(--panel);
    color: var(--muted); font-size: 11.5px; font-weight: 700;
    cursor: pointer; transition: all .15s; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .topic-pill:hover { background: #191924; }
  .topic-pill .p-pct { font-size: 10px; opacity: .75; }

  /* tier card */
  .tier-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; margin-bottom: 10px; overflow: hidden;
    border-left-width: 3px;
  }
  .tier-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; gap: 10px;
  }
  .tier-head-left { display: flex; align-items: center; gap: 9px; }
  .tier-badge {
    font-size: 10px; font-weight: 900; letter-spacing: .05em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 6px;
  }
  .tier-count { font-size: 11px; color: var(--muted); font-weight: 700; }
  .tier-mini-bar { width: 60px; height: 4px; background: #ffffff14; border-radius: 99px; overflow: hidden; }
  .tier-mini-fill { height: 100%; border-radius: 99px; }

  .tier-body { border-top: 1px solid #ffffff0a; }

  .ex-row {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 10px 16px; cursor: pointer; transition: background .12s;
  }
  .ex-row:not(:last-child) { border-bottom: 1px solid #ffffff08; }
  .ex-row:hover { background: #ffffff06; }
  .ex-num {
    width: 21px; height: 21px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; margin-top: 1px;
    border: 1.5px solid var(--faint); color: var(--muted);
    transition: all .15s;
  }
  .ex-num.done { border-color: transparent; color: #fff; }
  .ex-text { font-size: 13px; line-height: 1.5; color: #dde1ea; flex: 1; }
  .ex-text.done { color: #4a5063; text-decoration: line-through; }

  /* all topics overview */
  .overview-panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px; margin: 14px 0;
  }
  .overview-label {
    font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 10px;
  }
  .overview-row {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 7px 8px; border-radius: 8px; transition: background .12s;
  }
  .overview-row:hover { background: #ffffff08; }
  .overview-num { font-size: 11px; font-weight: 800; color: var(--faint); width: 18px; text-align: center; flex-shrink: 0; }
  .overview-title { font-size: 12px; font-weight: 600; color: #a9afc0; }
  .overview-sub { font-size: 10.5px; color: var(--faint); margin-top: 1px; }
  .overview-bar-wrap { width: 54px; height: 3px; background: #ffffff14; border-radius: 99px; overflow: hidden; flex-shrink: 0; }
  .overview-bar-fill { height: 100%; border-radius: 99px; }
  .overview-pct { font-size: 10.5px; font-weight: 800; width: 30px; text-align: right; flex-shrink: 0; }

  /* how to use panel */
  .howto-panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px; margin-bottom: 10px;
  }
  .howto-title { font-size: 11.5px; font-weight: 800; color: #a5b4fc; margin-bottom: 11px; }
  .howto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .howto-cell { background: var(--panel-2); border-radius: 9px; padding: 9px 11px; }
  .howto-cell-h { font-size: 10.5px; font-weight: 800; color: #cbd5e1; }
  .howto-cell-p { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

  .reset-row { text-align: center; padding: 18px 0 8px; }
  .reset-btn {
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    font-size: 11px; font-weight: 700; padding: 7px 14px; border-radius: 20px;
    cursor: pointer; transition: all .15s;
  }
  .reset-btn:hover { border-color: #ef444488; color: #f87171; }

  @media (max-width: 480px) {
    .tier-stats-grid { grid-template-columns: repeat(2, 1fr); }
    .howto-grid { grid-template-columns: 1fr; }
    .track-card-pct { font-size: 26px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

        `Implement Kyverno or OPA Gatekeeper policies enforced in both CI and at admission time`,
        `Build a self-service platform where policy enforcement and deployment status are visible on a dashboard`,
        `Capstone: combine Terraform, Ansible, ArgoCD, and OPA into one documented platform with an incident-recovery runbook`,
      ],
    ]},
    { name: "Capstone: Full Automation Pipeline", tiers: [
      [
        `Provision a VPC + EC2 with Terraform, then configure it with an Ansible playbook that installs Docker`,
        `Chain the two tools: Terraform outputs the EC2 IP, which dynamically feeds an Ansible inventory`,
        `Provision a small EKS or self-managed cluster with Terraform, then deploy a Helm chart onto it manually`,
        `Set up a CI pipeline that runs "terraform plan" on every pull request`,
      ],
      [
        `Build a pipeline where Terraform provisions infra, Ansible configures the OS, and Helm deploys the app`,
        `Add automated checks to the pipeline: terraform validate, ansible-lint, helm lint, plus a post-deploy smoke test`,
        `Implement environment promotion: auto-deploy to dev, but require manual approval for prod`,
        `Store all secrets properly with Vault or SSM instead of hardcoding them anywhere in the pipeline`,
      ],
      [
        `Build a self-service "environment factory" pipeline that spins up and tears down a full isolated environment per feature branch`,
        `Implement scheduled drift detection: run "terraform plan" nightly and alert on any detected drift`,
        `Add policy-as-code gates that block risky changes, like deleting a production database, without explicit override`,
        `Instrument the whole pipeline with observability — duration, failure rate, deployment frequency — in Grafana`,
      ],
      [
        `Design your "dream platform": Terraform, Ansible, Kubernetes + Helm, ArgoCD, OPA, and Prometheus/Grafana, all integrated`,
        `Write a disaster-recovery runbook and test it live by destroying and rebuilding your dev environment from code and backups`,
        `Present your platform architecture as if defending it in a senior DevOps/SRE interview`,
        `Open-source one component, like your Terraform module library or Ansible roles, with documentation, versioning, and tests`,
      ],
    ]},
  ],
},
];

/* ══════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════ */
let activeTrack = tracks[0].id;
let activeTopic = 0;
let completed = {};

function saveState() {
  try {
    localStorage.setItem("dpe_completed", JSON.stringify(completed));
    localStorage.setItem("dpe_track", activeTrack);
    localStorage.setItem("dpe_topic", String(activeTopic));
  } catch (e) {}
}
function loadState() {
  try {
    const c = localStorage.getItem("dpe_completed");
    if (c) completed = JSON.parse(c);
    const t = localStorage.getItem("dpe_track");
    if (t && tracks.some(tr => tr.id === t)) activeTrack = t;
    const p = localStorage.getItem("dpe_topic");
    if (p) activeTopic = parseInt(p, 10) || 0;
  } catch (e) {}
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════════ */
function key(trackId, topicIdx, tierIdx, exIdx) {
  return `${trackId}::${topicIdx}::${tierIdx}::${exIdx}`;
}

function countTier(trackId, topicIdx, tierIdx, exercises) {
  let done = 0;
  exercises.forEach((_, exIdx) => { if (completed[key(trackId, topicIdx, tierIdx, exIdx)]) done++; });
  return { done, total: exercises.length };
}

function countTopic(track, topicIdx) {
  const topic = track.topics[topicIdx];
  let done = 0, total = 0;
  topic.tiers.forEach((exs, tierIdx) => {
    const c = countTier(track.id, topicIdx, tierIdx, exs);
    done += c.done; total += c.total;
  });
  return { done, total };
}

function countTrack(track) {
  let done = 0, total = 0;
  track.topics.forEach((_, i) => {
    const c = countTopic(track, i);
    done += c.done; total += c.total;
  });
  return { done, total };
}

function countTrackTier(track, tierIdx) {
  let done = 0, total = 0;
  track.topics.forEach((topic, topicIdx) => {
    const c = countTier(track.id, topicIdx, tierIdx, topic.tiers[tierIdx]);
    done += c.done; total += c.total;
  });
  return { done, total };
}

function countAll() {
  let done = 0, total = 0;
  tracks.forEach(t => {
    const c = countTrack(t);
    done += c.done; total += c.total;
  });
  return { done, total };
}

function pct(done, total) { return total === 0 ? 0 : Math.round((done / total) * 100); }

/* ══════════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════════ */
function render() {
  renderGlobalProgress();
  renderLegend();
  renderTrackTabs();
  renderMain();
}

function renderGlobalProgress() {
  const { done, total } = countAll();
  document.getElementById("globalBarFill").style.width = pct(done, total) + "%";
  document.getElementById("globalProgressLabel").textContent = `${done} / ${total}`;
}

function renderLegend() {
  const el = document.getElementById("legend");
  el.innerHTML = LEVELS.map(l => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${l.color}"></span>${l.label}
    </div>
  `).join("");
}

function renderTrackTabs() {
  const el = document.getElementById("trackTabs");
  el.innerHTML = tracks.map(t => {
    const { done, total } = countTrack(t);
    const active = t.id === activeTrack;
    return `
      <button class="track-tab" data-action="select-track" data-track-id="${t.id}"
        style="border-bottom-color:${active ? t.color : 'transparent'}">
        <span class="t-emoji">${t.emoji}</span>
        <span class="t-name" style="color:${active ? t.color : 'var(--muted)'}">${t.title}</span>
        <span class="t-pct" style="color:${active ? t.color + 'aa' : 'var(--faint)'}">${pct(done,total)}%</span>
      </button>
    `;
  }).join("");
}

function renderMain() {
  const track = tracks.find(t => t.id === activeTrack);
  if (activeTopic >= track.topics.length) activeTopic = 0;
  const main = document.getElementById("mainContent");

  main.innerHTML = `
    ${renderTrackCard(track)}
    <div class="topic-selector" id="topicSelector"></div>
    <div id="topicPanel"></div>
    ${renderOverviewPanel(track)}
    ${renderHowTo()}
  `;

  renderTopicSelector(track);
  renderTopicPanel(track);
}

function renderTrackCard(track) {
  const { done, total } = countTrack(track);
  const tierChips = LEVELS.map((l, i) => {
    const c = countTrackTier(track, i);
    return `
      <div class="tier-stat-chip">
        <div class="tier-stat-name" style="color:${l.color}">${l.label.split(" ")[0].split("/")[0]}</div>
        <div class="tier-stat-frac">${c.done}/${c.total}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="track-card" style="background:linear-gradient(135deg, ${track.color}1c 0%, var(--panel) 65%); border-color:${track.color}33">
      <div class="track-card-top">
        <div>
          <div class="track-card-emoji">${track.emoji}</div>
          <div class="track-card-title">${track.title}</div>
          <div class="track-card-subtitle">${track.subtitle}</div>
          <div class="track-card-count">${track.topics.length} topics · ${total} exercises</div>
        </div>
        <div>
          <div class="track-card-pct" style="color:${track.color}">${pct(done,total)}%</div>
          <div class="track-card-pct-label">complete</div>
        </div>
      </div>
      <div class="track-progress-wrap">
        <div class="track-progress-fill" style="width:${pct(done,total)}%; background:linear-gradient(90deg, ${track.color}, ${track.color}99)"></div>
      </div>
      <div class="tier-stats-grid">${tierChips}</div>
    </div>
  `;
}

function renderTopicSelector(track) {
  const el = document.getElementById("topicSelector");
  el.innerHTML = track.topics.map((topic, i) => {
    const c = countTopic(track, i);
    const active = i === activeTopic;
    return `
      <button class="topic-pill" data-action="select-topic" data-topic-idx="${i}"
        style="border-color:${active ? track.color : 'var(--line)'}; background:${active ? track.color + '1f' : 'var(--panel)'}; color:${active ? track.color : 'var(--muted)'}">
        ${c.done === c.total ? `<span style="color:${track.color}">✓</span>` : `<span>${i+1}.</span>`}
        ${topic.name}
        <span class="p-pct" style="color:${active ? track.color + 'aa' : 'var(--faint)'}">${pct(c.done,c.total)}%</span>
      </button>
    `;
  }).join("");
}

function renderTopicPanel(track) {
  const topic = track.topics[activeTopic];
  const el = document.getElementById("topicPanel");

  const tierCards = topic.tiers.map((exercises, tierIdx) => {
    const level = LEVELS[tierIdx];
    const c = countTier(track.id, activeTopic, tierIdx, exercises);

    const rows = exercises.map((text, exIdx) => {
      const k = key(track.id, activeTopic, tierIdx, exIdx);
      const done = !!completed[k];
      return `
        <div class="ex-row" data-action="toggle-ex" data-track-id="${track.id}" data-topic-idx="${activeTopic}" data-tier-idx="${tierIdx}" data-ex-idx="${exIdx}">
          <div class="ex-num ${done ? 'done' : ''}" style="background:${done ? level.color : 'transparent'}; border-color:${done ? level.color : 'var(--faint)'}">
            ${done ? '✓' : exIdx + 1}
          </div>
          <div class="ex-text ${done ? 'done' : ''}">${text}</div>
        </div>
      `;
    }).join("");

    return `
      <div class="tier-card" style="border-left-color:${level.color}">
        <div class="tier-head">
          <div class="tier-head-left">
            <span class="tier-badge" style="background:${level.color}22; color:${level.color}">${level.label}</span>
            <span class="tier-count">${c.done}/${c.total}</span>
          </div>
          <div class="tier-mini-bar"><div class="tier-mini-fill" style="width:${pct(c.done,c.total)}%; background:${level.color}"></div></div>
        </div>
        <div class="tier-body">${rows}</div>
      </div>
    `;
  }).join("");

  el.innerHTML = tierCards;
}

function renderOverviewPanel(track) {
  const rows = track.topics.map((topic, i) => {
    const c = countTopic(track, i);
    const isActive = i === activeTopic;
    return `
      <div class="overview-row" data-action="select-topic" data-topic-idx="${i}">
        <div class="overview-num" style="color:${c.done === c.total ? track.color : 'var(--faint)'}">${c.done === c.total ? '✓' : i+1}</div>
        <div style="flex:1;min-width:0">
          <div class="overview-title" style="color:${isActive ? track.color : '#a9afc0'}">${topic.name}</div>
          <div class="overview-sub">${c.total} exercises</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="overview-bar-wrap"><div class="overview-bar-fill" style="width:${pct(c.done,c.total)}%; background:${track.color}"></div></div>
          <div class="overview-pct" style="color:${track.color}">${pct(c.done,c.total)}%</div>
        </div>
      </div>
    `;
  }).join("");

  return `
    <div class="overview-panel">
      <div class="overview-label">${track.title} · All Topics</div>
      ${rows}
    </div>
  `;
}

function renderHowTo() {
  const tips = [
    ["Don't skip to Expert", "Finish Basic + Intermediate across every topic in a track before touching Advanced."],
    ["One exercise ≠ one day", "Some Basics take 10 minutes. Some Experts take a full weekend. Let the exercise set the pace."],
    ["Redo, don't just read", "If you get stuck, rebuild the exercise from scratch — don't just glance at old code and check the box."],
    ["Weak topic? Do it twice", "If a topic feels shaky, clear every tier there before moving to the next topic."],
  ];
  return `
    <div class="howto-panel">
      <div class="howto-title">How to use this practice bank</div>
      <div class="howto-grid">
        ${tips.map(([h,p]) => `
          <div class="howto-cell">
            <div class="howto-cell-h">${h}</div>
            <div class="howto-cell-p">${p}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   EVENTS (delegated)
   ══════════════════════════════════════════════════════════════ */
document.addEventListener("click", function(e) {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;

  if (action === "select-track") {
    activeTrack = t.dataset.trackId;
    activeTopic = 0;
    saveState();
    render();
  } else if (action === "select-topic") {
    activeTopic = parseInt(t.dataset.topicIdx, 10);
    saveState();
    render();
  } else if (action === "toggle-ex") {
    const k = key(t.dataset.trackId, t.dataset.topicIdx, t.dataset.tierIdx, t.dataset.exIdx);
    completed[k] = !completed[k];
    saveState();
    render();
  }
});

document.getElementById("resetBtn").addEventListener("click", function() {
  if (confirm("Reset all progress across every track? This can't be undone.")) {
    completed = {};
    saveState();
    render();
  }
});

/* ══════════════════════════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════════════════════════ */
loadState();
render();
</script>
</body>
</html>
